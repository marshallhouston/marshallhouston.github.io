<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>redirecting to marshallhouston.wtf</title>
<meta name="robots" content="noindex">
<link rel="canonical" href="https://marshallhouston.wtf/">
<script>
  // preserve path + query + hash when redirecting
  var target = "https://marshallhouston.wtf" + window.location.pathname + window.location.search + window.location.hash;
  window.location.replace(target);
</script>
<meta http-equiv="refresh" content="0; url=https://marshallhouston.wtf/">
</head>
<body>
<p>this site has moved to <a href="https://marshallhouston.wtf/">marshallhouston.wtf</a>.</p>
</body>
</html>
